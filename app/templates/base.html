<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}STLi Network Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='styles.css') }}" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid page-shell">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">STLi Network Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'inventory' %}active{% endif %}" href="{{ url_for('inventory') }}">Inventario</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'topology' %}active{% endif %}" href="{{ url_for('topology') }}">Topología</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'audit' %}active{% endif %}" href="{{ url_for('audit') }}">Auditoría</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'changes' %}active{% endif %}" href="{{ url_for('changes') }}">Cambios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'search' %}active{% endif %}" href="{{ url_for('search') }}">Búsqueda</a>
            </li>
          </ul>
          <form class="d-flex" role="search" action="{{ url_for('search') }}" method="get">
            <input class="form-control form-control-sm me-2" type="search" name="q" value="{{ query | default('') }}" placeholder="VLAN, switch o puerto">
            <button class="btn btn-sm btn-outline-light" type="submit">Buscar</button>
          </form>
        </div>
      </div>
    </nav>

    <main class="container-fluid page-shell py-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
