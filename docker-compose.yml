services:
  network-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: network-portal
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist portal state and databases
      - ./data:/app/data
      # Mount the VM's oxidized archive directory
      - /home/ubuntu/monitoring/oxidized/archive:/app/oxidized-archive
      # Mount host SSH credentials for private git pulls
      - /home/ubuntu/.ssh:/root/.ssh:ro
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATA_DIR=/app/data/normalized_json
      - BACKUPS_GIT_DIR=/app/data/backups
      - STATE_FILE=/app/data/topology_state.json
      - OXIDIZED_ARCHIVE_DIR=/app/oxidized-archive
      - OXIDIZED_REPO_URL=git@github.com:STLi-SPA/INFRA-BACKUPS.git

  webssh:
    image: billchurch/webssh2:latest
    container_name: network-webssh
    restart: unless-stopped
    ports:
      - "80:2222"
